name: QA — PR Validation

on:
  pull_request:
    branches: [main, develop]

concurrency:
  group: qa-pr-${{ github.ref }}
  cancel-in-progress: true

jobs:
  e2e-critical:
    name: E2E Critical Tests
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install chromium --with-deps

      - name: Run E2E critical tests
        run: npx playwright test --project=e2e --grep "@critical" --reporter=json
        env:
          BASE_URL: ${{ secrets.BASE_URL }}
          CMS_USER: ${{ secrets.CMS_USER }}
          CMS_PASSWORD: ${{ secrets.CMS_PASSWORD }}
          SM2_API_TOKEN: ${{ secrets.SM2_API_TOKEN }}
          ACCOUNT_ID: ${{ secrets.ACCOUNT_ID }}
          MS_ENV: staging
        continue-on-error: false

      - name: Run visual regression check
        run: npx playwright test tests/regression/ux/ --project=regression
        env:
          BASE_URL: ${{ secrets.BASE_URL }}
          CMS_USER: ${{ secrets.CMS_USER }}
          CMS_PASSWORD: ${{ secrets.CMS_PASSWORD }}
          SM2_API_TOKEN: ${{ secrets.SM2_API_TOKEN }}
          ACCOUNT_ID: ${{ secrets.ACCOUNT_ID }}
          MS_ENV: staging
          VISUAL_DIFF_THRESHOLD: '0.02'
        continue-on-error: true

      - name: Upload test artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-results-pr-${{ github.event.pull_request.number }}
          path: |
            test-results/
            playwright-report/
          retention-days: 7

      - name: Comment PR on failure
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            let summary = '❌ **QA E2E — Tests fallaron en este PR**\n\n';
            summary += `**Branch:** \`${context.payload.pull_request.head.ref}\`\n`;
            summary += `**Run:** ${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}\n\n`;
            summary += 'Revisar los artifacts adjuntos para ver el detalle de los errores.';

            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: summary
            });
