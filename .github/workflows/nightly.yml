name: QA — Nightly Full Suite

on:
  schedule:
    - cron: '0 6 * * *'   # 03:00 Chile (UTC-3), runs at 06:00 UTC
  workflow_dispatch:
    inputs:
      module:
        description: 'Module to audit (leave empty for all)'
        required: false
        default: ''

jobs:
  full-e2e:
    name: Full E2E Suite
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install chromium --with-deps

      - name: Run all E2E tests
        run: npx playwright test --project=e2e --reporter=allure-playwright
        env:
          BASE_URL: ${{ secrets.BASE_URL }}
          CMS_USER: ${{ secrets.CMS_USER }}
          CMS_PASSWORD: ${{ secrets.CMS_PASSWORD }}
          SM2_API_TOKEN: ${{ secrets.SM2_API_TOKEN }}
          ACCOUNT_ID: ${{ secrets.ACCOUNT_ID }}
          MS_ENV: dev

      - name: Run regression tests
        run: npx playwright test --project=regression --reporter=allure-playwright
        env:
          BASE_URL: ${{ secrets.BASE_URL }}
          CMS_USER: ${{ secrets.CMS_USER }}
          CMS_PASSWORD: ${{ secrets.CMS_PASSWORD }}
          SM2_API_TOKEN: ${{ secrets.SM2_API_TOKEN }}
          ACCOUNT_ID: ${{ secrets.ACCOUNT_ID }}
          MS_ENV: dev
        continue-on-error: true

      - name: Run integration tests
        run: npx playwright test --project=integration --reporter=allure-playwright
        env:
          BASE_URL: ${{ secrets.BASE_URL }}
          CMS_USER: ${{ secrets.CMS_USER }}
          CMS_PASSWORD: ${{ secrets.CMS_PASSWORD }}
          SM2_API_TOKEN: ${{ secrets.SM2_API_TOKEN }}
          ACCOUNT_ID: ${{ secrets.ACCOUNT_ID }}
          MS_ENV: dev
        continue-on-error: true

  ux-audit:
    name: Full UX Audit
    runs-on: ubuntu-latest
    timeout-minutes: 45
    needs: full-e2e
    if: always()

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install chromium --with-deps

      - name: Restore baseline screenshots
        uses: actions/cache@v4
        with:
          path: reports/baseline/screenshots
          key: ux-baseline-screenshots-${{ github.sha }}
          restore-keys: ux-baseline-screenshots-

      - name: Run UX audit
        run: |
          MODULE="${{ github.event.inputs.module }}"
          if [ -n "$MODULE" ]; then
            node ux/runner.js --mode=audit --module="$MODULE"
          else
            node ux/runner.js --mode=audit
          fi
        env:
          BASE_URL: ${{ secrets.BASE_URL }}
          CMS_USER: ${{ secrets.CMS_USER }}
          CMS_PASSWORD: ${{ secrets.CMS_PASSWORD }}
          SM2_API_TOKEN: ${{ secrets.SM2_API_TOKEN }}
          ACCOUNT_ID: ${{ secrets.ACCOUNT_ID }}
          MS_ENV: dev

      - name: Save baseline screenshots cache
        uses: actions/cache@v4
        with:
          path: reports/baseline/screenshots
          key: ux-baseline-screenshots-${{ github.sha }}

      - name: Upload UX report
        uses: actions/upload-artifact@v4
        with:
          name: ux-audit-${{ github.run_id }}
          path: reports/
          retention-days: 30

  allure-report:
    name: Allure Report → GitHub Pages
    runs-on: ubuntu-latest
    needs: [full-e2e, ux-audit]
    if: always()

    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: all-artifacts/

      - name: Generate Allure report
        uses: simple-elf/allure-report-action@v1
        with:
          allure_results: allure-results
          allure_report: allure-report
          keep_reports: 20

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        if: github.ref == 'refs/heads/main'
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: allure-report
          destination_dir: reports/${{ github.run_number }}

  notify-slack:
    name: Slack Notification
    runs-on: ubuntu-latest
    needs: [full-e2e, ux-audit, allure-report]
    if: always()

    steps:
      - name: Notify result
        uses: 8398a7/action-slack@v3
        with:
          status: ${{ job.status }}
          fields: repo,message,commit,author,action,eventName,ref,workflow
          text: |
            *QA Nightly — ${{ github.run_number }}*
            E2E: ${{ needs.full-e2e.result }} | UX Audit: ${{ needs.ux-audit.result }}
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        if: env.SLACK_WEBHOOK_URL != ''
